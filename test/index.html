<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Kate & Bronson · RSVP</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap" rel="stylesheet">
  
  <style>
    /* ... all CSS unchanged from previous answer ... */
  </style>
</head>
<body>
  <img class="deco-img img-top" id="topImage" src="/images/top.webp" alt="Top overlapping tattoo" width="225" height="150">
  <img class="deco-img img-bottom" id="bottomImage" src="/images/bottom.webp" alt="Bottom overlapping tattoo" width="225" height="150">

  <div class="invitation-wrapper">
    <!-- Name prompt card -->
    <div class="name-prompt-card" id="namePromptCard">
      <h2>Welcome</h2>
      <div class="form-group">
        <input type="text" id="guestNameInput" placeholder="this will be used for seating, be as formal or as fun as you would like" autocomplete="off">
      </div>
      <button class="continue-btn" id="continueBtn">Continue</button>
    </div>

    <!-- Main RSVP form (hidden initially) -->
    <div class="form-card" id="formCard">
      <!-- ... content unchanged ... -->
    </div>
  </div>

  <script>
    (function() {
      const topImg = document.getElementById('topImage');
      const bottomImg = document.getElementById('bottomImage');
      const namePromptCard = document.getElementById('namePromptCard');
      const formCard = document.getElementById('formCard');
      const guestNameInput = document.getElementById('guestNameInput');
      const continueBtn = document.getElementById('continueBtn');
      const guestNameLine = document.getElementById('guestNameLine');
      const hiddenFullName = document.getElementById('hiddenFullName');
      
      let scrollEnabled = false;   // 🔒 Start with parallax disabled
      const easeSlow = (t) => Math.pow(t, 3.5);
      
      function updateImagePositions() {
        if (!scrollEnabled) return;   // 🛑 Do nothing during name prompt
        
        const scrollY = window.scrollY;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        const rawProgress = maxScroll > 0 ? Math.min(scrollY / maxScroll, 1) : 0;
        const progress = easeSlow(rawProgress);
        
        const topHeight = topImg.offsetHeight || 150;
        const bottomHeight = bottomImg.offsetHeight || 150;
        const viewportHeight = window.innerHeight;
        
        const topInitialTop = 20;
        const bottomInitialBottom = 20;
        const centerY = viewportHeight / 2;
        
        const topTargetMove = centerY - topInitialTop - (topHeight / 2);
        const bottomInitialTop = viewportHeight - bottomHeight - bottomInitialBottom;
        const bottomTargetMove = centerY - bottomInitialTop - (bottomHeight / 2);
        
        topImg.style.transform = `translateX(-50%) translateY(${progress * topTargetMove}px)`;
        bottomImg.style.transform = `translateX(-50%) translateY(${progress * bottomTargetMove}px)`;
      }

      let ticking = false;
      function onScroll() {
        if (!scrollEnabled) return;
        if (!ticking) {
          window.requestAnimationFrame(() => {
            updateImagePositions();
            ticking = false;
          });
          ticking = true;
        }
      }

      function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
      }

      function proceedWithName() {
        const guestName = guestNameInput.value.trim();
        if (!guestName) {
          alert('Please enter your name to continue.');
          return;
        }
        
        guestNameLine.textContent = guestName + ',';
        hiddenFullName.value = guestName;
        
        namePromptCard.classList.add('hidden');
        formCard.classList.add('visible');
        
        // ✅ Enable parallax scrolling now that main form is visible
        scrollEnabled = true;
        // Immediately update image positions based on current scroll
        updateImagePositions();
        
        document.querySelectorAll('textarea').forEach(ta => {
          autoResize(ta);
        });
      }

      continueBtn.addEventListener('click', proceedWithName);
      guestNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          proceedWithName();
        }
      });

      window.addEventListener('load', () => {
        // Keep images at default transform (0,0) initially
        updateImagePositions(); // Will do nothing because scrollEnabled is false
        setTimeout(() => {
          // Ensure images are correctly positioned if needed
        }, 20);
        document.querySelectorAll('textarea').forEach(ta => {
          autoResize(ta);
          ta.addEventListener('input', () => autoResize(ta));
        });
      });
      
      window.addEventListener('scroll', onScroll);
      window.addEventListener('resize', () => {
        if (scrollEnabled) updateImagePositions();
      });
      
      topImg.addEventListener('load', () => { if (scrollEnabled) updateImagePositions(); });
      bottomImg.addEventListener('load', () => { if (scrollEnabled) updateImagePositions(); });

      const form = document.getElementById('weddingRsvp');
      
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const busCheckboxes = form.querySelectorAll('input[name="bus"]');
        if (!Array.from(busCheckboxes).some(cb => cb.checked)) {
          alert('Please select at least one travel/bus option.');
          return;
        }

        const phone = form.querySelector('input[name="phone"]').value.trim();
        const email = form.querySelector('input[name="email"]').value.trim();
        if (!phone && !email) {
          alert('Please provide either a phone number or email address.');
          return;
        }

        // 🔒 Lock images in current position (prevent iOS shift)
        const topTransform = window.getComputedStyle(topImg).transform;
        const bottomTransform = window.getComputedStyle(bottomImg).transform;
        topImg.style.transform = topTransform;
        bottomImg.style.transform = bottomTransform;
        scrollEnabled = false;  // Stop further updates
        window.removeEventListener('scroll', onScroll);
        window.removeEventListener('resize', updateImagePositions);

        formCard.classList.add('fade-out');
        
        setTimeout(() => {
          form.submit();
        }, 600);
      });

      window.addEventListener('resize', () => {
        document.querySelectorAll('textarea').forEach(autoResize);
      });
    })();
  </script>
</body>
</html>
